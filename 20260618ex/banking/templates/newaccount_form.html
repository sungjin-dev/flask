<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BANK SERVICE</title>

    <link href="{{url_for('static', filename='css/common.css')}}" rel="stylesheet">
    <link href="{{url_for('static', filename='css/bank.css')}}" rel="stylesheet">

    <script src="{{url_for('static', filename='js/bank.js')}}"></script>

</head>
<body>

    {% include 'include/header.html' %}
    {% include 'include/nav.html' %}

    <article id="newaccount_wrap">
        <div class="newaccount_form">
            <form action="/bank/newaccount_confirm"  method="post" name="newaccount_form">
                <input type="hidden" name="aNum" value="{{account.aNum}}">
                <input class="input_basic" type="text" name="aNum" value="{{account.aNum}}" readonly disabled>   
                <br>
                <input class="input_basic" type="password" name="aPw" placeholder="Input new Account PW">
                <br>
                <input class="input_button_basic_130" type="button" value="NEW ACCOUNT" onclick="newaccountForm();">
                <input class="input_button_basic_130" type="reset" value="RESET">
            </form>
        </div>
    </article>

    {% include 'include/footer.html' %}

</body>
</html>
